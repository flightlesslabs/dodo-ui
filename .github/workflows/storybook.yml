name: Deploy Storybook to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Setup Node first so Node 24 is active globally
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # 2. Setup pnpm now that a compatible Node version is available
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
          # Optional: You can move the cache option here if desired, 
          # but setup-node + pnpm setup handles it fine once ordered like this.

      - name: Install Dependencies
        run: pnpm install

      - name: Build UI Packages
        run: pnpm --filter @flightlesslabs/* build

      - name: Build Storybook
        run: pnpm --filter @documentation/docs... build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: documentation/docs/storybook-static
