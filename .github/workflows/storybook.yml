name: Deploy Storybook to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Use Node.js 24 and configure the pnpm dependency cache
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      # 2. Use Corepack to reliably activate pnpm 11 within Node 24
      - name: Setup pnpm 11
        run: |
          corepack enable
          corepack prepare pnpm@latest-11 --activate

      - name: Install Dependencies
        run: pnpm install

      - name: Build UI Packages
        run: pnpm --filter @flightlesslabs/* build

      - name: Build Storybook
        run: pnpm --filter @documentation/docs... build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: documentation/docs/storybook-static
