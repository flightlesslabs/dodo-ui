name: Deploy Storybook to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Boot up Node 24 safely without trying to look for an uninstalled pnpm
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # 2. Safely configure pnpm 11 under the clean Node 24 environment
      - name: Setup pnpm 11
        run: |
          corepack enable
          corepack prepare pnpm@latest-11 --activate

      # 3. Handle dependency caching manually now that pnpm safely exists in the PATH
      - name: Cache pnpm files
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install

      - name: Build UI Packages
        run: pnpm --filter @flightlesslabs/* build

      - name: Build Storybook
        run: pnpm --filter @documentation/docs... build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: documentation/docs/storybook-static
